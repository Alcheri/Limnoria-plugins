[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "limnoria-googlemaps"
version = "1.0.0"
readme = "README.md"
requires-python = ">=3.10"
authors = [
    { name = "Barry Suridge" }
]
dependencies = [
    "aiohttp",
    "nest_asyncio",
]
classifiers = [
    "Environment :: Plugins",
    "Programming Language :: Python :: 3",
    "Topic :: Communications :: Chat",
]

[project.entry-points.'limnoria.plugins']
GoogleMaps = "limnoria_googlemaps"

[tool.setuptools.package-dir]
"limnoria_googlemaps" = "."
"limnoria_googlemaps.local" = "local/"

[tool.setuptools.package-data]
"limnoria_googlemaps" = ["locales/*.po"]
