[build-system]
requires = ["setuptools"]

[project]
name = "limnoria-id"
version = "0.0.0"
authors = [
    { name = "Barry Suridge" }
]
readme = "README.md"
dependencies = [
    "limnoria",
]
classifiers = [
    'Environment :: Plugins',
    'Programming Language :: Python :: 3',
    'Topic :: Communications :: Chat',
]

[project.entry-points.'limnoria.plugins']
ID = "limnoria_id"

[tool.black]
target-version = ["py311"]
extend-exclude = '''
/(
    backup
  | conf
  | data
  | logs
  | tmp
  | __pycache__
  | \.pytest_cache
)/
'''

[tool.setuptools.package-dir]
"limnoria_id" = "."
"limnoria_id.local" = "local/"

[tool.setuptools.package-data]
"limnoria_id" = ["locales/*.po"]
