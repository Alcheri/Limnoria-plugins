<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1600" height="900" viewBox="0 0 1600 900"
     xmlns="http://www.w3.org/2000/svg"
     style="background:#0C0C0C;">
  
  <!-- Windows-Dark background -->
  <rect width="1600" height="900" fill="#0C0C0C"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#D8DEE9"/>
    </marker>
  </defs>

  <!-- Layer boxes -->
  <g stroke="#D8DEE9" fill="none" stroke-width="2">
    <rect x="80" y="120" width="220" height="120" rx="20"/>
    <rect x="420" y="120" width="220" height="120" rx="20"/>
    <rect x="760" y="120" width="220" height="120" rx="20"/>
    <rect x="1100" y="120" width="220" height="120" rx="20"/>
    <rect x="590" y="460" width="260" height="120" rx="20"/>
  </g>

  <!-- Text -->
  <g fill="#ECEFF4" font-family="Arial" font-size="32" text-anchor="middle">
    <text x="190" y="185">Command Layer</text>
    <text x="530" y="185">Geocoding Layer</text>
    <text x="870" y="185">Weather Layer</text>
    <text x="1210" y="185">Formatting Layer</text>
    <text x="720" y="530">Output Layer</text>
  </g>

  <!-- Flow nodes -->
  <g stroke="#88C0D0" fill="none" stroke-width="2">
    <rect x="120" y="320" width="140" height="80" rx="14"/>
    <rect x="460" y="320" width="140" height="80" rx="14"/>
    <rect x="800" y="320" width="140" height="80" rx="14"/>
    <rect x="1140" y="320" width="140" height="80" rx="14"/>
    <rect x="650" y="680" width="220" height="90" rx="14"/>
  </g>

  <g fill="#E5E9F0" font-family="Arial" font-size="24" text-anchor="middle">
    <text x="190" y="365">Input / Options</text>
    <text x="530" y="365">Geocode</text>
    <text x="530" y="393">Address</text>
    <text x="870" y="365">Fetch Weather</text>
    <text x="1210" y="365">Format Reply</text>
    <text x="760" y="730">IRC Reply / Error</text>
  </g>

  <!-- Arrows -->
  <g stroke="#D8DEE9" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <line x1="260" y1="360" x2="460" y2="360"/>
    <line x1="600" y1="360" x2="800" y2="360"/>
    <line x1="940" y1="360" x2="1140" y2="360"/>
    <line x1="1210" y1="400" x2="760" y2="680"/>
  </g>
</svg>
